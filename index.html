<!DOCTYPE html>
<html>
<head>
    <title>CatGPT</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="floating-paws">
    <span>🐾</span>
    <span>🐾</span>
    <span>🐾</span>
    <span>🐾</span>
    <span>🐾</span>
</div>

<div class="container">

    <div class="watermark">
        © Nairita
    </div>

    <div class="logo-container">

        <div class="paw-logo">
            🐾
        </div>

        <h1>CatGPT</h1>

        <p class="tagline">
            Premium AI Assistant For Cats
        </p>

    </div>

    <div class="features">

        <div class="card">🐾 Behavior</div>
        <div class="card">🔊 Sounds</div>
        <div class="card">🍖 Food</div>
        <div class="card">💊 Medicine</div>
        <div class="card">🛒 Shopping</div>
        <div class="card">🩺 Vet Help</div>

    </div>

    <div class="chat-box" id="chatBox">

        <div class="bot-message">
            Meow! Ask me anything about cats 🐱
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="question"
            placeholder="Ask CatGPT about cats..."
        >

        <button onclick="askCat()">
            Send
        </button>

    </div>

    <div class="footer">
        © 2026 Nairita • CatGPT™ • All Rights Reserved 🐾
    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
