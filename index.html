<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatGPT by Nairita</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="bg-paws">
    <span>🐾</span><span>🐾</span><span>🐾</span><span>🐾</span><span>🐾</span>
  </div>

  <button class="hamburger" onclick="toggleSidebar()">☰</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <h3>📜 Recent Chats</h3>
      <button onclick="toggleSidebar()">×</button>
    </div>

    <div id="historyList" class="history-list"></div>

    <button class="clear-btn" onclick="clearHistory()">🗑 Clear History</button>
  </aside>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🐱</div>
        <div>
          <h1>CatGPT</h1>
          <p>Your AI Cat Care Assistant 🐾</p>
        </div>
      </div>

      <div class="badge">CATGPT PRO</div>
    </header>

    <section class="quick-actions">
      <button onclick="quickAsk('Why does my cat bite softly?')">🐾 Behavior</button>
      <button onclick="quickAsk('Why does my cat meow at night?')">🔊 Sounds</button>
      <button onclick="quickAsk('Best healthy food for cats?')">🍗 Food</button>
      <button onclick="quickAsk('What medicine is safe for cats?')">💊 Medicine</button>
      <button onclick="quickAsk('Best shopping items for a new cat?')">🛒 Shopping</button>
      <button onclick="quickAsk('When should I take my cat to a vet?')">🩺 Vet Help</button>
    </section>

    <section class="chat-card">
      <div id="chatBox" class="chat-box">
        <div class="message bot">
          <div class="avatar">🐱</div>
          <div class="bubble">
            Meow! I am CatGPT 🐾<br>
            Ask me anything about cats only.
          </div>
        </div>
      </div>

      <div class="input-area">
        <input id="question" placeholder="Ask CatGPT about cats..." />
        <button class="mic-btn" onclick="startVoice()">🎤</button>
        <button class="send-btn" onclick="askCat()">➤ Send</button>
      </div>
    </section>

    <footer>
      © 2026 Nairita • CatGPT™ • All Rights Reserved 🐾
    </footer>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
